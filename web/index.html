<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>asm runner</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header class="bar">
      <h1>asm runner</h1>
      <span id="state-pill">ready</span>
      <span id="pc-pill">pc 0x00</span>
      <span id="cycle-pill">cycle 0</span>
      <span id="format-pill">text</span>
    </header>

    <section class="tools">
      <button id="step-button" type="button">step</button>
      <button id="run-button" type="button">run</button>
      <button id="pause-button" type="button">pause</button>
      <button id="reset-button" type="button">reset</button>
      <label>
        speed
        <input id="speed-input" type="range" min="40" max="900" value="240">
      </label>
      <button id="load-text-button" type="button">load text</button>
      <button id="load-sample-button" type="button">sample</button>
      <label class="file">
        import
        <input id="file-input" type="file" accept=".s,.asm,.bin,application/octet-stream">
      </label>
      <span id="load-message"></span>
    </section>

    <section class="grid">
      <div class="pane source">
        <div class="title">source</div>
        <textarea id="assembly-input" spellcheck="false"></textarea>
      </div>

      <div class="pane instructions">
        <div class="title">instructions</div>
        <div id="instruction-list" class="instruction-list"></div>
      </div>

      <div class="pane registers">
        <div class="title">registers</div>
        <div id="register-grid" class="register-grid"></div>
      </div>

      <div class="pane side">
        <div class="title">next</div>
        <code id="next-instruction">halt</code>

        <div class="title">output</div>
        <pre id="output-view"></pre>

        <div class="title">pointers</div>
        <div id="pointer-list" class="pointer-list"></div>

        <div class="stats">
          <span>printed <b id="print-count">0</b></span>
          <span>instr <b id="instruction-count">0</b></span>
        </div>
      </div>

      <div class="pane memory">
        <div class="title">
          memory
          <label>
            from
            <input id="memory-start" type="number" min="0" max="255" value="0">
          </label>
        </div>
        <div id="memory-grid" class="memory-grid"></div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
